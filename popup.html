<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Distilleri</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
    }
    .header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .fallacies-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 12px;
    }
    .fallacy-item {
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .fallacy-item:hover {
      background: #f5f5f5;
    }
    .fallacy-item.active {
      background: #fff3e0;
      border-left: 3px solid #ff9800;
    }
    .fallacy-name {
      font-weight: 600;
      color: #c62828;
    }
    .fallacy-id {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }
    .fallacy-explanation {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }
    .status {
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status-dot.active {
      background: #4caf50;
    }
    .status-dot.inactive {
      background: #999;
    }
	.distillButt{
		
	}
	.infoDiv{}
  </style>
</head>
<body>
  <div class="header">Distilleri</div>
  <input type="button" id="distillButt" class="distillButt" value="D">
  <div id="infoDiv" class="infoDiv"></div>
  <input type="image" id="settingsButt" class="settingsButt" src="" alt="Settings">
  <script src="popup.js"></script>
</body>
</html>
